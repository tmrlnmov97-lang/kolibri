<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="apple-touch-icon" href="assets/logo.png">
<title>Меню — Колибри</title>
<style>
  /* ============ FONTS (local) ============ */
  @font-face{font-family:'Ouvality';src:url('assets/fonts/Ouvality.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap}
  @font-face{font-family:'Geometria';src:url('assets/fonts/Geometria-Medium.otf') format('opentype');font-weight:400 500;font-style:normal;font-display:swap}
  @font-face{font-family:'Geometria';src:url('assets/fonts/Geometria-Bold.otf') format('opentype');font-weight:600 700;font-style:normal;font-display:swap}
  @font-face{font-family:'Geometria';src:url('assets/fonts/Geometria-ExtraBold.otf') format('opentype');font-weight:800;font-style:normal;font-display:swap}
  /* ============ TOKENS ============ */
  :root{
    --red:#c6492e;          /* header bar          */
    --red-accent:#c44031;   /* logo / accents      */
    --ink:#352a29;          /* primary text        */
    --cream:#fffcf0;        /* text on red         */
    --band:#efe8d2;         /* footer surface      */
    --bg:#ffffff;

    --display:'Ouvality', cursive;          /* real font */
    --body:'Geometria', system-ui, sans-serif; /* real font */

    --maxw:1200px;
    --pad:36px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto} *{animation:none!important;transition:none!important}}

  body{font-family:var(--body);color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  :focus-visible{outline:2px solid var(--red-accent);outline-offset:3px;border-radius:4px}

  /* ============ HEADER ============ */
  .header{background:var(--red);color:var(--cream);position:sticky;top:0;z-index:50}
  .header__inner{max-width:var(--maxw);margin:0 auto;padding:16px var(--pad);display:flex;align-items:center;justify-content:space-between;gap:24px}
  .logo{font-family:var(--display);font-size:34px;color:var(--cream);display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
  .logo img{height:40px;width:auto;display:block}
  .logo svg{width:34px;height:20px;flex:0 0 auto}
  .nav{display:flex;gap:34px;align-items:center}
  .nav a{font-size:15px;font-weight:500;position:relative;padding:4px 0;color:var(--cream)}
  .nav a::after{content:"";position:absolute;left:0;right:100%;bottom:0;height:1.5px;background:currentColor;transition:right .25s ease}
  .nav a:hover::after,.nav a[aria-current="page"]::after{right:0}
  .burger{display:none;background:none;border:0;cursor:pointer;flex-direction:column;gap:6px;padding:6px;color:var(--cream)}
  .burger span{width:28px;height:2px;background:currentColor;border-radius:2px}

  /* ============ MENU ============ */
  .menu{flex:1 0 auto;max-width:var(--maxw);width:100%;margin:0 auto;padding:clamp(28px,4vw,48px) var(--pad)}
  .menu__title{text-align:center;margin-bottom:clamp(22px,3vw,34px)}
  .menu__title .script{font-family:var(--display);color:var(--red-accent);font-size:clamp(40px,6vw,64px);line-height:1}
  .menu__title .sub{display:block;font-weight:500;color:var(--ink);font-size:clamp(16px,2vw,20px);margin-top:6px}

  .sheets{display:grid;grid-template-columns:1fr 1fr;gap:clamp(16px,2.5vw,28px)}
  .sheet{
    display:block;border-radius:24px;overflow:hidden;position:relative;
    box-shadow:0 18px 50px -28px rgba(53,42,41,.45);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .sheet:hover{transform:translateY(-4px);box-shadow:0 26px 60px -28px rgba(53,42,41,.55)}
  .sheet img{width:100%;height:auto}
  .sheet__zoom{
    position:absolute;right:14px;bottom:14px;
    background:var(--red-accent);color:var(--cream);
    width:42px;height:42px;border-radius:50%;
    display:grid;place-items:center;opacity:0;transition:opacity .2s ease;
    box-shadow:0 8px 20px -8px rgba(196,64,49,.8);
  }
  .sheet:hover .sheet__zoom,.sheet:focus-visible .sheet__zoom{opacity:1}
  .sheet__zoom svg{width:20px;height:20px}

  /* ============ LIGHTBOX ============ */
  .lb{position:fixed;inset:0;z-index:100;background:rgba(28,18,16,.92);display:none;place-items:center;padding:24px;cursor:zoom-out}
  .lb[data-open="true"]{display:grid}
  .lb img{max-width:96vw;max-height:92vh;border-radius:10px;box-shadow:0 30px 80px -20px rgba(0,0,0,.7)}
  .lb__close{position:fixed;top:18px;right:24px;background:none;border:0;color:var(--cream);font-size:38px;line-height:1;cursor:pointer}

  /* ============ FOOTER ============ */
  .footer{flex-shrink:0;position:relative;background:var(--band);color:var(--ink);margin-top:clamp(36px,5vw,60px)}
  .footer__scallop{display:block;width:100%;height:40px;color:var(--band);margin-top:-1px}
  .footer__scallop svg{display:block;width:100%;height:100%}
  .footer__inner{max-width:var(--maxw);margin:0 auto;padding:10px var(--pad) 44px;display:flex;flex-wrap:wrap;gap:24px 40px;align-items:flex-start;justify-content:space-between}
  .footer .legal a{display:block;font-size:13px;font-weight:500;text-decoration:underline;text-underline-offset:2px;margin-bottom:8px}
  .footer .fnav{display:flex;flex-wrap:wrap;gap:14px 28px}
  .footer .fnav a{font-size:15px;font-weight:500}
  .footer .fnav a:hover{color:var(--red-accent)}

  /* ============ DRAWER (mobile) ============ */
  .drawer{position:fixed;inset:0 0 0 auto;width:min(82%,360px);background:var(--red);color:var(--cream);z-index:80;transform:translateX(100%);transition:transform .3s ease;padding:88px 28px 28px;display:flex;flex-direction:column;gap:6px;box-shadow:-24px 0 60px -20px rgba(0,0,0,.5)}
  .drawer[data-open="true"]{transform:translateX(0)}
  .drawer a{font-size:18px;padding:12px 0;font-weight:500}
  .drawer__close{position:absolute;top:24px;right:24px;background:none;border:0;color:var(--cream);font-size:30px;line-height:1;cursor:pointer}
  .overlay{position:fixed;inset:0;background:rgba(53,42,41,.5);z-index:75;opacity:0;visibility:hidden;transition:opacity .3s ease}
  .overlay[data-open="true"]{opacity:1;visibility:visible}

  /* ============ RESPONSIVE ============ */
  @media (max-width:760px){
    .nav{display:none}
    .burger{display:inline-flex}
    .sheets{grid-template-columns:1fr;gap:18px}
    .sheet__zoom{opacity:1}
  }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header">
  <div class="header__inner">
    <a class="logo" href="Home.html" aria-label="Колибри — на главную">
      <img src="assets/logo.png" alt="Колибри">
    </a>
    <nav class="nav" aria-label="Главное меню">
      <a href="Menu.html" aria-current="page">меню</a>
      <a href="Banquets.html">банкеты и свадьбы</a>
      <a href="Delivery.html">доставка</a>
      <a href="About.html">о ресторане</a>      <a href="Contacts.html">контакты</a>
    </nav>
    <button class="burger" id="burger" aria-label="Меню" aria-expanded="false" aria-controls="drawer">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- ===== MENU ===== -->
<main class="menu">
  <div class="menu__title">
    <span class="script">Меню</span>
    <span class="sub">кухня и карта напитков — нажмите, чтобы увеличить</span>
  </div>

  <div class="sheets">
    <a class="sheet" href="assets/menu-food.jpg" data-lb aria-label="Открыть меню кухни">
      <img src="assets/menu-food.jpg" alt="Меню — кухня: закуски, салаты, супы, горячие блюда, пицца, десерты" loading="lazy">
      <span class="sheet__zoom" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M11 8v6M8 11h6M20 20l-4-4"/></svg>
      </span>
    </a>
    <a class="sheet" href="assets/menu-drinks.jpg" data-lb aria-label="Открыть карту напитков">
      <img src="assets/menu-drinks.jpg" alt="Алкоголь: вина, коктейли, виски, ром, текила и другое" loading="lazy">
      <span class="sheet__zoom" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M11 8v6M8 11h6M20 20l-4-4"/></svg>
      </span>
    </a>
  </div>
</main>

<!-- ===== FOOTER ===== -->
<footer class="footer">
  <div class="footer__scallop" aria-hidden="true">
    <svg viewBox="0 0 1200 40" preserveAspectRatio="none" fill="currentColor">
      <path d="M0 40V10C100 10 100 0 200 0s100 10 200 10 100-10 200-10 100 10 200 10 100-10 200-10 100 10 200 10v30z"/>
    </svg>
  </div>
  <div class="footer__inner">
    <nav class="fnav" aria-label="Нижнее меню">
      <a href="Menu.html" aria-current="page">меню</a>
      <a href="Banquets.html">банкеты и свадьбы</a>
      <a href="Delivery.html">доставка</a>
      <a href="About.html">о ресторане</a>      <a href="Contacts.html">контакты</a>
    </nav>
  </div>
</footer>

<!-- ===== LIGHTBOX ===== -->
<div class="lb" id="lb" aria-hidden="true">
  <button class="lb__close" id="lbClose" aria-label="Закрыть">&times;</button>
  <img id="lbImg" src="" alt="">
</div>

<!-- ===== DRAWER ===== -->
<div class="overlay" id="overlay"></div>
<nav class="drawer" id="drawer" aria-label="Меню">
  <button class="drawer__close" id="drawerClose" aria-label="Закрыть">&times;</button>
  <a href="Menu.html" aria-current="page">меню</a>
      <a href="Banquets.html">банкеты и свадьбы</a>
      <a href="Delivery.html">доставка</a>
      <a href="About.html">о ресторане</a>  <a href="Contacts.html">контакты</a>
</nav>

<script>
  // mobile drawer
  const burger=document.getElementById('burger');
  const drawer=document.getElementById('drawer');
  const overlay=document.getElementById('overlay');
  const dClose=document.getElementById('drawerClose');
  function setNav(open){
    drawer.dataset.open=open;overlay.dataset.open=open;
    burger.setAttribute('aria-expanded',open);
    document.body.style.overflow=open?'hidden':'';
  }
  burger.addEventListener('click',()=>setNav(true));
  overlay.addEventListener('click',()=>setNav(false));
  dClose.addEventListener('click',()=>setNav(false));
  drawer.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>setNav(false)));

  // lightbox
  const lb=document.getElementById('lb');
  const lbImg=document.getElementById('lbImg');
  const lbClose=document.getElementById('lbClose');
  function openLb(src,alt){lbImg.src=src;lbImg.alt=alt;lb.dataset.open='true';document.body.style.overflow='hidden'}
  function closeLb(){lb.dataset.open='false';lbImg.src='';document.body.style.overflow=''}
  document.querySelectorAll('[data-lb]').forEach(a=>{
    a.addEventListener('click',e=>{e.preventDefault();const img=a.querySelector('img');openLb(a.getAttribute('href'),img.alt)});
  });
  lb.addEventListener('click',closeLb);
  lbClose.addEventListener('click',closeLb);

  addEventListener('keydown',e=>{if(e.key==='Escape'){setNav(false);closeLb()}});
</script>
</body>
</html>
